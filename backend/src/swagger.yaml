openapi: 3.0.0
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: API documentation for the Finance Dashboard backend containing User Management, Financial Records, and Dashboard Insights.
servers:
  - url: http://localhost:3000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /api/users/login:
    post:
      summary: Login to the system
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Successful login
        '401':
          description: Invalid credentials

  /api/users:
    get:
      summary: Get all users (Admin only)
      tags: [Users]
      responses:
        '200':
          description: List of users
    post:
      summary: Create a new user (Admin only)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [viewer, analyst, admin]
      responses:
        '201':
          description: User created

  /api/users/{id}:
    get:
      summary: Get user by ID (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
    patch:
      summary: Update user details (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [viewer, analyst, admin]
      responses:
        '200':
          description: User updated

  /api/users/{id}/status:
    patch:
      summary: Update user status (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Status updated

  /api/records:
    get:
      summary: Get user records
      tags: [Records]
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of records
    post:
      summary: Create a record (Analyst/Admin)
      tags: [Records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type, category]
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [income, expense]
                category:
                  type: string
                date:
                  type: string
                  format: date-time
                note:
                  type: string
      responses:
        '201':
          description: Record created

  /api/records/{id}:
    put:
      summary: Update a record
      tags: [Records]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [income, expense]
                category:
                  type: string
                date:
                  type: string
                  format: date-time
                note:
                  type: string
      responses:
        '200':
          description: Record updated
    delete:
      summary: Delete a record
      tags: [Records]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Record deleted

  /api/dashboard/summary:
    get:
      summary: Get dashboard summary (Analyst/Admin)
      tags: [Dashboard]
      responses:
        '200':
          description: Financial summary including net balance, totals, and trends.
